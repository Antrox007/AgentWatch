name: Build Windows installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64
          - target: aarch64-pc-windows-msvc
            arch: arm64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build installer (${{ matrix.arch }})
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentwatch-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Locate NSIS installer
        id: locate
        shell: bash
        run: |
          exe=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe)
          echo "exe_path=$exe" >> "$GITHUB_OUTPUT"

      - name: Publish installer to Vercel Blob
        shell: bash
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          npx --yes vercel@latest blob put "${{ steps.locate.outputs.exe_path }}" \
            --rw-token "$BLOB_READ_WRITE_TOKEN" \
            --access public \
            --pathname "installers/AgentWatch-${{ matrix.arch }}-setup.exe" \
            --allow-overwrite
