name: Build Windows installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64
          - target: aarch64-pc-windows-msvc
            arch: arm64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build installer (${{ matrix.arch }})
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Rename installer to stable asset name
        id: locate
        shell: bash
        run: |
          exe=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe)
          dest="AgentWatch-${{ matrix.arch }}-setup.exe"
          cp "$exe" "$dest"
          echo "asset_path=$dest" >> "$GITHUB_OUTPUT"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentwatch-${{ matrix.arch }}
          path: ${{ steps.locate.outputs.asset_path }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          assets=(artifacts/agentwatch-x64/AgentWatch-x64-setup.exe artifacts/agentwatch-arm64/AgentWatch-arm64-setup.exe)
          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --repo "${{ github.repository }}" --clobber
          else
            gh release create "$tag" "${assets[@]}" \
              --repo "${{ github.repository }}" \
              --title "AgentWatch $tag" \
              --generate-notes
          fi
